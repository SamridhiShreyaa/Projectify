services:
  # Node.js Backend API
  - type: web
    name: projectify-api
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # You will set this manually in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      # This automatically links the AI_SERVICE_URL to the external URL of the AI service below
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: projectify-ai
          envVarKey: RENDER_EXTERNAL_URL
      # Allows browser requests from the deployed static client. Static sites can't
      # be targeted by fromService, so this is the client's default Render hostname
      # (derived from its `name` below) — update if you attach a custom domain.
      - key: ALLOWED_ORIGINS
        value: https://projectify-client.onrender.com

  # Python FastAPI AI Service
  - type: web
    name: projectify-ai
    env: python
    plan: free
    buildCommand: cd ai_service && pip install -r requirements.txt
    startCommand: cd ai_service && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12

  # React Frontend (static site)
  - type: web
    name: projectify-client
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      # Baked into the build; points the client at the deployed server's origin
      - key: VITE_API_URL
        fromService:
          type: web
          name: projectify-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      # SPA fallback so direct navigation to client-side routes (e.g. /saved) works
      - type: rewrite
        source: /*
        destination: /index.html
