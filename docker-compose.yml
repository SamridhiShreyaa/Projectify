version: '3.8'

services:
  # Python FastAPI AI Service
  ai_service:
    build: ./ai_service
    ports:
      - "8001:8001"
    env_file:
      - ./ai_service/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./ai_service:/app
    working_dir: /app

  # Node.js Express Backend
  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - ai_service
    volumes:
      - ./server:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev

  # React Frontend (Vite)
  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev
